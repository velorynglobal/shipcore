openapi: 3.0.0
info:
  title: ShipCore ERP API
  description: Smart Logistics ERP for LCL, CHA & Freight Forwarders
  version: 1.0.0
  contact:
    name: ShipCore Support
    email: support@shipcore.com
    url: https://shipcore.com

servers:
  - url: https://shipcore.vercel.app
    description: Production server
  - url: http://localhost:3000
    description: Local development server

paths:
  /api/agent-instruct:
    post:
      summary: Send instruction to AI agent
      description: Forwards instruction to target agent via AI Router
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [instruction, target_agent]
              properties:
                instruction:
                  type: string
                  description: Instruction text to send to agent
                  example: "Analyze shipment #123"
                target_agent:
                  type: string
                  description: Target agent key (german_agent, andrew_agent, etc.)
                  example: german_agent
                priority:
                  type: string
                  enum: [low, medium, high]
                  default: high
      responses:
        '200':
          description: Instruction forwarded successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message_id:
                    type: string
                  ai_model:
                    type: string
        '400':
          description: Missing instruction or target_agent
        '401':
          description: Unauthorized
        '404':
          description: Agent not found

  /api/ai-router:
    post:
      summary: AI Router (7-model fallback)
      description: Routes request through 7-model fallback chain
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [instruction]
              properties:
                instruction:
                  type: string
                  example: "Generate invoice PDF"
                context:
                  type: object
                  description: Optional context for AI
                modelHint:
                  type: string
                  enum: [claude, gpt]
      responses:
        '200':
          description: AI response
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  response:
                    type: string
                  model:
                    type: string
                  provider:
                    type: string
        '500':
          description: AI Router failed

  /api/pdf/invoice:
    post:
      summary: Generate Invoice PDF
      description: Generates PDF for invoice with optional email
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [invoice]
              properties:
                invoice:
                  type: object
                  properties:
                    invoice_number:
                      type: string
                    customer:
                      type: object
                      properties:
                        company_name:
                          type: string
                    total_amount:
                      type: number
                email_to:
                  type: string
                  format: email
      responses:
        '200':
          description: PDF generated
          content:
            application/pdf: {}
        '400':
          description: Missing invoice payload
        '401':
          description: Unauthorized

  /api/pdf/quote:
    post:
      summary: Generate Quote PDF
      description: Generates PDF for quote with optional email
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [quote]
              properties:
                quote:
                  type: object
                email_to:
                  type: string
                  format: email
      responses:
        '200':
          description: PDF generated
          content:
            application/pdf: {}
        '400':
          description: Missing quote payload

  /api/pdf/hbl:
    post:
      summary: Generate HBL PDF
      description: Generates House Bill of Lading PDF
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [hbl]
              properties:
                hbl:
                  type: object
                email_to:
                  type: string
      responses:
        '200':
          description: PDF generated
          content:
            application/pdf: {}
        '400':
          description: Missing HBL payload

  /api/whatsapp:
    post:
      summary: WhatsApp webhook
      description: Receives WhatsApp messages and creates enquiries
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                from:
                  type: string
                text:
                  type: string
                message_id:
                  type: string
      responses:
        '200':
          description: Enquiry created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  enquiry_id:
                    type: string
        '400':
          description: Invalid webhook payload

  /api/invites:
    post:
      summary: Send user invitation
      description: Admin sends invitation to new user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
                role:
                  type: string
                  enum: [admin, operator, viewer]
                  default: operator
      responses:
        '200':
          description: Invitation sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        '400':
          description: Email required or invalid role
        '401':
          description: Unauthorized
        '403':
          description: Admin access required
        '409':
          description: User already exists

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Supabase Auth token

  schemas:
    Invoice:
      type: object
      properties:
        id:
          type: string
          format: uuid
        invoice_number:
          type: string
        customer_id:
          type: string
        total_amount:
          type: number
        status:
          type: string
          enum: [draft, sent, paid, overdue, cancelled]

    Quote:
      type: object
      properties:
        id:
          type: string
        quote_number:
          type: string
        customer_id:
          type: string
        sell_total:
          type: number

    AgentMessage:
      type: object
      properties:
        id:
          type: string
        from_agent:
          type: string
        to_agent:
          type: string
        message_type:
          type: string
        status:
          type: string
          enum: [pending, completed, failed]
